name: CI

on:
  push:
    branches: [master, development]
  pull_request:
    branches: [master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: rootpass
          MYSQL_DATABASE: washerproject
          MYSQL_USER: washer
          MYSQL_PASSWORD: washerpass
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build and test
        run: mvn clean package
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_NAME: washerproject
          DB_USER: washer
          DB_PASS: washerpass
          SMTP_FROM: ci@example.com
          SMTP_PASSWORD: fake
          MANAGER_EMAIL: manager@example.com
          CORS_ORIGIN: http://localhost:3000

      - name: Upload WAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: washer-war
          path: target/washer.war
